<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A premium, elegant Todo List application with glassmorphism design, smooth animations, and full LocalStorage persistence." />
  <title>Luminate — Premium Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <main class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
        </div>
        <h1 class="brand-name">Luminate</h1>
      </div>
      <p class="brand-tagline">Your tasks, beautifully managed.</p>
    </header>

    <!-- Stats bar -->
    <section class="stats-bar" aria-label="Task statistics">
      <div class="stat-card" id="stat-total">
        <span class="stat-value" id="total-count">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card" id="stat-active">
        <span class="stat-value" id="active-count">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat-card" id="stat-done">
        <span class="stat-value" id="done-count">0</span>
        <span class="stat-label">Done</span>
      </div>
    </section>

    <!-- Input area -->
    <section class="input-section" aria-label="Add new task">
      <div class="input-wrapper glass-card">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs to be done?"
          maxlength="200"
          autocomplete="off"
          aria-label="New task input"
        />
        <button id="add-btn" class="add-btn" aria-label="Add task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </section>

    <!-- Filter tabs -->
    <nav class="filter-nav" aria-label="Filter tasks">
      <button id="filter-all" class="filter-btn active" data-filter="all">All</button>
      <button id="filter-active" class="filter-btn" data-filter="active">Active</button>
      <button id="filter-completed" class="filter-btn" data-filter="completed">Completed</button>
    </nav>

    <!-- Task list -->
    <section class="task-list-section" aria-label="Task list">
      <ul id="task-list" class="task-list" role="list" aria-live="polite" aria-label="Tasks">
        <!-- Tasks rendered by JS -->
      </ul>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state" aria-hidden="true">
        <div class="empty-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 12h8M12 8v8"></path>
          </svg>
        </div>
        <p class="empty-title">Nothing here yet</p>
        <p class="empty-subtitle">Add your first task above to get started.</p>
      </div>
    </section>

    <!-- Footer actions -->
    <footer class="app-footer" id="footer-actions" style="display:none;">
      <span id="items-left" class="items-left-label"></span>
      <button id="clear-completed-btn" class="clear-btn" aria-label="Clear completed tasks">
        Clear Completed
      </button>
    </footer>

  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Edit task" hidden>
    <div class="modal-card glass-card">
      <h2 class="modal-title">Edit Task</h2>
      <input type="text" id="edit-input" class="task-input modal-input" maxlength="200" aria-label="Edit task text" />
      <div class="modal-actions">
        <button id="cancel-edit-btn" class="modal-btn cancel-btn">Cancel</button>
        <button id="save-edit-btn" class="modal-btn save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="main.js"></script>
</body>
</html>
